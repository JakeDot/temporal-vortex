<svg xmlns="http://www.w3.org/2000/svg" viewBox="0, 0, 695.31, 404.45" font-family="SauceCodePro Nerd Font, Source Code Pro, Courier" font-size="14"><g fill="#D3D3D3"><rect x="0" y="0" width="695.31" height="404.45" fill="#000000"/><text x="20" y="34.55">$ tv --help</text><text x="20" y="53.55">Usage: tv [options] [command]</text><text x="20" y="91.55">Extract change timestamps from a git repository</text><text x="20" y="129.55">Options:</text><text x="36.8" y="148.55">  -V, --version              output the version number</text><text x="36.8" y="167.55">  -h, --help                 display help for command</text><text x="20" y="205.55">Commands:</text><text x="36.8" y="224.55">  annotate [options] &#x3C;file&#x3E;  Show per-line timestamps for a file (like git</text><text x="263.64" y="243.55">                             blame, focused on age)</text><text x="36.8" y="262.55">  log [options] [file]       Show commit history with timestamps for a file or</text><text x="263.64" y="281.55">                             the whole repo</text><text x="36.8" y="300.55">  summary [options] [path]   Show aggregated timestamp statistics for every</text><text x="263.64" y="319.55">                             tracked file under path</text><text x="36.8" y="338.55">  github                     Extract timestamped events from the GitHub API</text><text x="36.8" y="357.55">  help [command]             display help for command</text></g></svg>