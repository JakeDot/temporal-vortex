name: Create PR Snapshot Branch

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  create-snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Get commit message
        id: commit_msg
        run: |
          # Get the full commit message of the PR head
          MSG=$(git log -1 --pretty=%B ${{ github.event.pull_request.head.sha }})
          # Store it in an output for later steps
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if this is the initial placeholder commit
        id: check_initial
        run: |
          MSG="${{ steps.commit_msg.outputs.message }}"
          # Trim whitespace and convert to lowercase
          TRIMMED=$(echo "$MSG" | xargs | tr '[:upper:]' '[:lower:]')
          
          if [ "$TRIMMED" = "initial plan" ]; then
            echo "is_initial=true" >> $GITHUB_OUTPUT
          else
            echo "is_initial=false" >> $GITHUB_OUTPUT
          fi

      - name: Create/Update snapshot branch
        if: steps.check_initial.outputs.is_initial == 'false'
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          SNAPSHOT_REF="refs/heads/snapshots/pr-${PR_NUMBER}"
          
          echo "✓ First real commit detected. Creating snapshot branch: snapshots/pr-${PR_NUMBER}"
          git push origin ${{ github.event.pull_request.head.sha }}:${SNAPSHOT_REF}

      - name: Skip for placeholder commit
        if: steps.check_initial.outputs.is_initial == 'true'
        run: |
          echo "⊘ Skipping snapshot creation for 'Initial Plan' placeholder commit"
          echo "   Snapshot branch will be created when a real commit is pushed to this PR"
